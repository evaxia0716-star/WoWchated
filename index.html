<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 喊話翻譯｜太陽井版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=JetBrains+Mono:wght@500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* 沿用快捷板的太陽井主題，讓面板能無縫嵌入 */
:root{
  --bg:#f5ead0; --bg-glow:#fdf4da;
  --card:#fffdf5; --card-hover:#fff7e2;
  --line:#e0cfa4;
  --text:#41321a; --text-dim:#8a7a58; --text-mute:#b3a37d;
  --gold:#b8860b; --gold-bright:#f0c14b; --phoenix:#c34a36;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:radial-gradient(1400px 500px at 50% -12%, var(--bg-glow), var(--bg) 65%);
  color:var(--text); font-family:'Noto Sans TC',sans-serif;
  min-height:100vh; padding:24px 16px 60px;
}
.wrap{max-width:640px;margin:0 auto}
h1{font-family:'Cinzel','Noto Sans TC',serif;font-size:22px;letter-spacing:.05em;color:var(--gold);margin-bottom:4px}
.sub{font-size:13px;color:var(--text-dim);margin-bottom:20px;line-height:1.7}

/* 翻譯主卡 */
.trans-card{background:var(--card);border:1px solid var(--gold-bright);border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 2px 10px rgba(120,90,20,.1)}
.label{font-size:12.5px;font-weight:700;letter-spacing:.06em;color:var(--text-dim);margin-bottom:7px;display:flex;align-items:center;gap:6px}
textarea{width:100%;background:#fffdf5;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:15px;color:var(--text);font-family:inherit;outline:none;resize:vertical;min-height:60px;line-height:1.6;transition:border-color .15s}
textarea:focus{border-color:var(--gold)}
textarea::placeholder{color:var(--text-mute)}
.go-row{display:flex;gap:8px;margin-top:11px;align-items:center}
#goBtn{flex:1;background:var(--gold-bright);border:1px solid var(--gold);border-radius:10px;padding:11px;font-size:15px;font-weight:700;color:#3a2b0a;cursor:pointer;font-family:inherit;transition:filter .15s}
#goBtn:hover{filter:brightness(1.05)}
#goBtn:disabled{opacity:.5;cursor:not-allowed}
.quota{font-size:11.5px;color:var(--text-mute);white-space:nowrap}

/* 結果區 */
.result{margin-top:15px;border-top:1px dashed var(--line);padding-top:15px;display:none}
.result.show{display:block}
.en-out{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;line-height:1.5;color:var(--text);background:var(--card-hover);border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:10px;padding:13px 15px;word-break:break-word;cursor:pointer;position:relative;transition:background .15s}
.en-out:hover{background:#fff2d0}
.en-out .hint{display:block;font-size:11px;color:var(--text-mute);margin-top:6px;font-family:'Noto Sans TC'}
.en-out.copied{border-color:var(--gold)}
.en-out.copied::after{content:"✓ 已複製";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,250,235,.94);color:var(--gold);font-size:16px;font-weight:700;letter-spacing:.1em;border-radius:10px}
.loading{color:var(--text-dim);font-size:14px;padding:10px 2px}
.err{color:var(--phoenix);font-size:13.5px;padding:10px 2px;line-height:1.6}

/* 設定區 */
details{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:16px;overflow:hidden}
summary{padding:12px 16px;font-size:14px;font-weight:700;color:var(--gold);cursor:pointer;list-style:none}
summary::before{content:"▸ "}
details[open] summary::before{content:"▾ "}
.setbody{padding:0 16px 16px}
.setbody label{display:block;font-size:12.5px;color:var(--text-dim);margin:10px 0 5px}
.setbody input{width:100%;background:#fffdf5;border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:13.5px;color:var(--text);font-family:'JetBrains Mono',monospace;outline:none}
.setbody input:focus{border-color:var(--gold)}
.setbody button{margin-top:10px;background:var(--gold-bright);border:1px solid var(--gold);border-radius:8px;padding:8px 18px;font-size:13.5px;font-weight:700;color:#3a2b0a;cursor:pointer;font-family:inherit}
.setbody .hint{font-size:11.5px;color:var(--text-mute);line-height:1.7;margin-top:8px}
.setbody .hint code{background:#fdf3d7;padding:1px 5px;border-radius:4px;font-family:'JetBrains Mono',monospace}

/* 最近翻譯 */
.recent{margin-top:6px}
.recent-item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 13px;margin-bottom:7px;cursor:pointer;transition:background .15s}
.recent-item:hover{background:var(--card-hover)}
.recent-item .r-en{font-family:'JetBrains Mono',monospace;font-size:13.5px;font-weight:600;color:var(--text)}
.recent-item .r-zh{font-size:12px;color:var(--text-dim);margin-top:2px}

#toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--gold);color:#fffbe8;font-weight:700;font-size:14px;padding:10px 22px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50;box-shadow:0 4px 18px rgba(140,100,10,.35)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <h1>AI 喊話翻譯</h1>
  <div class="sub">打中文 → 翻成美服野團口吻的英文 → 點一下複製，回遊戲貼上。</div>

  <details id="setupBox">
    <summary>⚙ 第一次使用：設定翻譯櫃檯網址</summary>
    <div class="setbody">
      <label>Apps Script 網頁應用程式網址</label>
      <input id="apiUrl" placeholder="https://script.google.com/macros/s/AKfyc.../exec">
      <button id="saveUrl">儲存</button>
      <div class="hint">
        這是你自己部署的 Apps Script 網址（照 <code>Code.gs</code> 裡的步驟）。<br>
        只存在這台瀏覽器，不會外流。設定好之後這個區塊就可以收起來了。
      </div>
    </div>
  </details>

  <div class="trans-card">
    <div class="label">🈶 中文</div>
    <textarea id="zhIn" placeholder="例：這波我沒大招，可以穩一點拉嗎？" autocomplete="off"></textarea>
    <div class="go-row">
      <button id="goBtn">翻譯並準備複製</button>
      <span class="quota" id="quota"></span>
    </div>
    <div class="result" id="result">
      <div class="label">🔤 英文（點卡片複製）</div>
      <div id="resultBody"></div>
    </div>
  </div>

  <div class="label" style="margin-top:22px">🕑 這次開啟後翻過的（點可再複製）</div>
  <div class="recent" id="recent">
    <div style="font-size:12.5px;color:var(--text-mute);padding:4px 2px">還沒有紀錄。</div>
  </div>
</div>

<div id="toast">已複製</div>

<script>
const $=id=>document.getElementById(id);
const LS_URL="wow-translate-url";
let apiUrl=localStorage.getItem(LS_URL)||"";
let recent=[];  // 這次工作階段的翻譯紀錄（不落地，重整就清空）

// 初始化設定欄
$("apiUrl").value=apiUrl;
if(!apiUrl) $("setupBox").open=true;   // 沒設過就自動展開設定
$("saveUrl").addEventListener("click",()=>{
  apiUrl=$("apiUrl").value.trim();
  localStorage.setItem(LS_URL,apiUrl);
  showToast(apiUrl?"櫃檯網址已儲存":"已清空");
  if(apiUrl) $("setupBox").open=false;
});

// 主翻譯流程
$("goBtn").addEventListener("click",translate);
$("zhIn").addEventListener("keydown",e=>{
  // Ctrl/Cmd + Enter 快速送出
  if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){e.preventDefault();translate();}
});

async function translate(){
  const zh=$("zhIn").value.trim();
  if(!zh){showToast("先打一句中文");return;}
  if(!apiUrl){showToast("先到 ⚙ 設定翻譯櫃檯網址");$("setupBox").open=true;return;}

  const result=$("result"),body=$("resultBody"),btn=$("goBtn");
  result.classList.add("show");
  body.innerHTML=`<div class="loading">翻譯中…（第一次可能慢一點）</div>`;
  btn.disabled=true;

  try{
    // 用 GET + 查詢字串，避開 Apps Script 的 CORS 預檢問題
    const url=apiUrl+"?q="+encodeURIComponent(zh);
    const res=await fetch(url);
    const data=await res.json();

    if(!data.ok){
      body.innerHTML=`<div class="err">✗ ${escapeHTML(data.error||"翻譯失敗")}</div>`;
      btn.disabled=false;
      return;
    }

    const en=data.en;
    body.innerHTML=`<div class="en-out" id="enOut">${escapeHTML(en)}<span class="hint">點這裡複製，回遊戲 Ctrl+V</span></div>`;
    $("enOut").addEventListener("click",()=>copyResult(en));

    // 額度顯示
    if(typeof data.left==="number") $("quota").textContent="今日剩 "+data.left+" 次";

    // 自動複製（點按鈕的當下就複製，省一步）
    await copyResult(en,true);

    // 記進「最近」
    addRecent(zh,en);

  }catch(err){
    body.innerHTML=`<div class="err">✗ 連不上翻譯櫃檯。<br>檢查：網址對嗎？Apps Script 有部署成「所有人可存取」嗎？<br><span style="color:var(--text-mute)">${escapeHTML(err.message)}</span></div>`;
  }
  btn.disabled=false;
}

async function copyResult(text,silent){
  const ok=await copyText(text);
  if(ok){
    const el=$("enOut");
    if(el){el.classList.add("copied");setTimeout(()=>el.classList.remove("copied"),850);}
    if(!silent) showToast("已複製，回遊戲貼上");
    else showToast("翻好並已複製 ✓");
  }else showToast("複製失敗，請用 https 網址開啟");
}

async function copyText(text){
  try{await navigator.clipboard.writeText(text);return true;}
  catch(e){
    const ta=document.createElement("textarea");
    ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.select();
    let ok=false;try{ok=document.execCommand("copy")}catch(e2){}
    document.body.removeChild(ta);return ok;
  }
}

function addRecent(zh,en){
  recent.unshift({zh,en});
  if(recent.length>8) recent.pop();
  renderRecent();
}
function renderRecent(){
  const box=$("recent");
  if(!recent.length){box.innerHTML=`<div style="font-size:12.5px;color:var(--text-mute);padding:4px 2px">還沒有紀錄。</div>`;return;}
  box.innerHTML=recent.map(r=>
    `<div class="recent-item" data-en="${escapeHTML(r.en)}">
       <div class="r-en">${escapeHTML(r.en)}</div>
       <div class="r-zh">${escapeHTML(r.zh)}</div>
     </div>`).join("");
  box.querySelectorAll(".recent-item").forEach(el=>{
    el.addEventListener("click",async()=>{
      if(await copyText(el.dataset.en)) showToast("已複製");
    });
  });
}

function escapeHTML(t){return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
let toastTimer;
function showToast(msg){
  const t=$("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),1600);
}
</script>
</body>
</html>
